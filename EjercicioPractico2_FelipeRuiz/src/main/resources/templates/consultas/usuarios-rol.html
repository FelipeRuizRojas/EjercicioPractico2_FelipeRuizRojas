<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios por Rol - Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container my-4">
        <h2 class="mb-4"><i class="bi bi-people"></i> Buscar Usuarios por Rol</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/consultas/usuarios-por-rol}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="form-label">Rol</label>
                        <select name="rol" class="form-select">
                            <option value="ADMIN" th:selected="${rolBusqueda == 'ADMIN'}">ADMIN</option>
                            <option value="ORGANIZADOR" th:selected="${rolBusqueda == 'ORGANIZADOR'}">ORGANIZADOR</option>
                            <option value="CLIENTE" th:selected="${rolBusqueda == 'CLIENTE'}">CLIENTE</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-info text-white"><i class="bi bi-search"></i> Buscar</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${usuarios != null}">
            <h5>Resultados: <span th:text="${#lists.size(usuarios)}"></span> usuario(s)</h5>
            <div class="table-responsive">
                <table class="table table-striped" th:if="${!#lists.isEmpty(usuarios)}">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nombre</th><th>Email</th><th>Rol</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="u : ${usuarios}">
                            <td th:text="${u.id}"></td>
                            <td th:text="${u.nombre}"></td>
                            <td th:text="${u.email}"></td>
                            <td><span class="badge bg-info" th:text="${u.rol.nombre}"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${#lists.isEmpty(usuarios)}" class="alert alert-warning">No se encontraron usuarios.</div>
        </div>

        <a th:href="@{/consultas}" class="btn btn-secondary mt-3"><i class="bi bi-arrow-left"></i> Volver</a>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
