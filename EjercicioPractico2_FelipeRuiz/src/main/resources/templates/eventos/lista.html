<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos - Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container my-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-calendar3"></i> Gestión de Eventos</h2>
            <a th:href="@{/eventos/nuevo}" class="btn btn-warning" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">
                <i class="bi bi-plus-circle"></i> Nuevo Evento
            </a>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Fecha</th>
                        <th>Capacidad</th>
                        <th>Estado</th>
                        <th sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="evento : ${eventos}">
                        <td th:text="${evento.id}"></td>
                        <td th:text="${evento.nombre}"></td>
                        <td th:text="${#strings.abbreviate(evento.descripcion, 50)}"></td>
                        <td th:text="${evento.fecha}"></td>
                        <td th:text="${evento.capacidad}"></td>
                        <td>
                            <span class="badge" th:classappend="${evento.activo} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${evento.activo} ? 'Activo' : 'Inactivo'"></span>
                        </td>
                        <td sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR')">
                            <a th:href="@{/eventos/editar/{id}(id=${evento.id})}" class="btn btn-sm btn-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/eventos/eliminar/{id}(id=${evento.id})}" class="btn btn-sm btn-danger"
                               onclick="return confirm('¿Está seguro de eliminar este evento?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div th:if="${#lists.isEmpty(eventos)}" class="alert alert-info">
            No hay eventos registrados.
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
