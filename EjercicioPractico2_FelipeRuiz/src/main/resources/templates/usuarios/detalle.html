<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle Usuario - Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0"><i class="bi bi-person-lines-fill"></i> Detalle del Usuario</h4>
                    </div>
                    <div class="card-body">
                        <dl class="row">
                            <dt class="col-sm-4">ID:</dt>
                            <dd class="col-sm-8" th:text="${usuario.id}"></dd>

                            <dt class="col-sm-4">Nombre:</dt>
                            <dd class="col-sm-8" th:text="${usuario.nombre}"></dd>

                            <dt class="col-sm-4">Email:</dt>
                            <dd class="col-sm-8" th:text="${usuario.email}"></dd>

                            <dt class="col-sm-4">Rol:</dt>
                            <dd class="col-sm-8">
                                <span class="badge bg-info" th:text="${usuario.rol.nombre}"></span>
                            </dd>

                            <dt class="col-sm-4">Activo:</dt>
                            <dd class="col-sm-8">
                                <span class="badge" th:classappend="${usuario.activo} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${usuario.activo} ? 'Sí' : 'No'"></span>
                            </dd>

                            <dt class="col-sm-4">Fecha Creación:</dt>
                            <dd class="col-sm-8" th:text="${usuario.fechaCreacion}"></dd>
                        </dl>
                        <a th:href="@{/usuarios}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                        <a th:href="@{/usuarios/editar/{id}(id=${usuario.id})}" class="btn btn-warning">
                            <i class="bi bi-pencil"></i> Editar
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
