<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos por Nombre - Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container my-4">
        <h2 class="mb-4"><i class="bi bi-type"></i> Buscar Eventos por Nombre</h2>

        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form th:action="@{/consultas/eventos-por-nombre}" method="get" class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label">Nombre del evento</label>
                        <input type="text" name="nombre" class="form-control" th:value="${nombreBusqueda}"
                               placeholder="Buscar por nombre..." required>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-warning"><i class="bi bi-search"></i> Buscar</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${eventos != null}">
            <h5>Resultados: <span th:text="${#lists.size(eventos)}"></span> evento(s)</h5>
            <div class="table-responsive">
                <table class="table table-striped" th:if="${!#lists.isEmpty(eventos)}">
                    <thead class="table-dark">
                        <tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Fecha</th><th>Estado</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="e : ${eventos}">
                            <td th:text="${e.id}"></td>
                            <td th:text="${e.nombre}"></td>
                            <td th:text="${#strings.abbreviate(e.descripcion, 50)}"></td>
                            <td th:text="${e.fecha}"></td>
                            <td><span class="badge" th:classappend="${e.activo} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${e.activo} ? 'Activo' : 'Inactivo'"></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div th:if="${#lists.isEmpty(eventos)}" class="alert alert-warning">No se encontraron eventos.</div>
        </div>

        <a th:href="@{/consultas}" class="btn btn-secondary mt-3"><i class="bi bi-arrow-left"></i> Volver</a>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
