<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuario - Plataforma de Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; }
        main { flex: 1; }
        footer { background-color: #343a40; color: white; padding: 20px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container my-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-person-plus" th:if="${usuario.id == null}"></i>
                            <i class="bi bi-person-gear" th:if="${usuario.id != null}"></i>
                            <span th:text="${usuario.id == null} ? 'Nuevo Usuario' : 'Editar Usuario'"></span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${usuario.id == null} ? @{/usuarios/guardar} : @{/usuarios/actualizar}"
                              method="post" th:object="${usuario}">
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}" required>
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}"
                                       th:required="${usuario.id == null}"
                                       th:placeholder="${usuario.id != null} ? 'Dejar vacío para mantener la actual' : ''">
                            </div>

                            <div class="mb-3">
                                <label for="rol" class="form-label">Rol</label>
                                <select class="form-select" id="rol" th:field="*{rol.id}" required>
                                    <option value="">Seleccione un rol</option>
                                    <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.nombre}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
                                    <label class="form-check-label" for="activo">Usuario Activo</label>
                                </div>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save"></i> Guardar
                                </button>
                                <a th:href="@{/usuarios}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancelar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
